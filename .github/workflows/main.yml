name: Simple VPS + Pterodactyl

on:
  workflow_dispatch:

jobs:
  vps:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y nginx php8.1 php8.1-fpm php8.1-mysql mysql-server curl wget

    - name: Start Services
      run: |
        sudo systemctl start nginx mysql
        sudo systemctl enable nginx mysql

    - name: Create Web Directory
      run: |
        sudo mkdir -p /var/www/html
        echo "<?php phpinfo(); ?>" | sudo tee /var/www/html/index.php
        sudo chown -R www-data:www-data /var/www

    - name: Get IP Info
      run: |
        echo "=========================================="
        echo "✅ VPS READY!"
        echo "📡 Akses via tmate SSH di bawah"
        echo "🌐 IP: $(curl -s ifconfig.me)"
        echo "=========================================="
        echo ""
        echo "👉 Setelah tmate terbuka, jalankan:"
        echo "sudo bash <(curl -s https://pterodactyl-installer.se)"
        echo ""

    - name: Start tmate SSH
      uses: mxschmitt/action-tmate@v3
