name: Pterodactyl VPS - Docker Version

on:
  workflow_dispatch:

jobs:
  vps:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Install Docker
        run: |
          sudo apt update
          sudo apt install -y docker.io docker-compose curl wget
          sudo systemctl start docker

      - name: Run Pterodactyl Panel with Docker
        run: |
          mkdir -p ~/pterodactyl
          cd ~/pterodactyl
          cat > docker-compose.yml <<EOF
          version: '3'
          services:
            panel:
              image: ghcr.io/pterodactyl/panel:latest
              ports:
                - "80:80"
              environment:
                - APP_URL=http://localhost
                - DB_HOST=db
                - DB_PORT=3306
                - DB_DATABASE=panel
                - DB_USERNAME=pterodactyl
                - DB_PASSWORD=password123
              depends_on:
                - db
            db:
              image: mariadb:10
              environment:
                - MYSQL_DATABASE=panel
                - MYSQL_USER=pterodactyl
                - MYSQL_PASSWORD=password123
                - MYSQL_RANDOM_ROOT_PASSWORD=yes
          EOF
          sudo docker-compose up -d

      - name: Show info
        run: |
          IP=$(curl -s ifconfig.me)
          echo "=========================================="
          echo "✅ DOCKER PTERODACTYL READY!"
          echo "Panel: http://$IP"
          echo "=========================================="

      - name: tmate SSH
        uses: mxschmitt/action-tmate@v3
