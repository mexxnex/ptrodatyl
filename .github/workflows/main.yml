name: VPS with Tailscale (Fixed)

on:
  workflow_dispatch:

jobs:
  vps:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Start Tailscale (clean method)
        env:
          TS_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          # Kill existing tailscaled if any
          sudo pkill tailscaled || true
          sudo rm -f /var/run/tailscale/tailscaled.sock
          
          # Start fresh
          sudo tailscaled --state=/var/lib/tailscale/tailscaled.state &
          sleep 5
          
          # Connect
          sudo tailscale up --authkey=$TS_AUTHKEY --hostname=github-vps --accept-routes

      - name: Setup root SSH
        run: |
          echo "root:TaichelPass123!" | sudo chpasswd
          sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh

      - name: Show connection info
        run: |
          TS_IP=$(sudo tailscale ip -4)
          echo "=========================================="
          echo "✅ VPS with TAICHEL (Tailscale) READY!"
          echo "=========================================="
          echo ""
          echo "📡 Tailscale IP: $TS_IP"
          echo ""
          echo "🔑 ROOT ACCESS:"
          echo "  ssh root@$TS_IP"
          echo "  Password: TaichelPass123!"
          echo ""
          echo "📥 Install Tailscale pertama di komputer kamu:"
          echo "  https://tailscale.com/download"
          echo "=========================================="

      - name: tmate backup
        uses: mxschmitt/action-tmate@v3

      - name: Keep alive
        run: sleep 21000
